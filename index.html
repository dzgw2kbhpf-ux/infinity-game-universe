<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Infinity Game Universe</title>

<style>

body{
margin:0;
background:#0a0a0a;
color:white;
font-family:Arial;
}

header{
padding:20px;
font-size:32px;
text-align:center;
background:linear-gradient(90deg,#ff00cc,#3333ff);
font-weight:bold;
}

.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:20px;
padding:20px;

}

.game{

background:#1e1e1e;
border-radius:15px;
padding:25px;
text-align:center;
cursor:pointer;
font-size:18px;
transition:0.2s;

}

.game:hover{

transform:scale(1.05);
background:#333;

}

iframe{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
border:none;
display:none;

}

.back{

position:fixed;
top:20px;
left:20px;
background:red;
border:none;
padding:10px 20px;
border-radius:10px;
color:white;
display:none;
z-index:10;

}

</style>

</head>

<body>

<header>

🌌 Infinity Game Universe

</header>

<div class="grid">

<div class="game" onclick="play('fps.html')">
🔫 FPS
</div>

<div class="game" onclick="play('minecraft.html')">
🧱 Minecraft
</div>

<div class="game" onclick="play('racing.html')">
🏎 Racing
</div>

<div class="game" onclick="play('gta.html')">
🚗 GTA
</div>

<div class="game" onclick="play('sandbox.html')">
🌍 Open World
</div>

</div>

<button class="back" onclick="back()">

戻る

</button>

<iframe id="game"></iframe>

<script>

function play(game){

let frame=document.getElementById("game")

frame.src=game

frame.style.display="block"

document.querySelector(".back").style.display="block"

}

function back(){

document.getElementById("game").style.display="none"

document.querySelector(".back").style.display="none"

}

</script>

</body>
</html>
