<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Infinity Game Universe</title>

<style>

body{

margin:0;

font-family:Arial;

background:#0b0b0b;

color:white;

}

header{

font-size:34px;

text-align:center;

padding:20px;

font-weight:bold;

background:linear-gradient(90deg,#ff00cc,#3333ff);

}

.games{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(160px,1fr));

gap:15px;

padding:20px;

}

.game{

background:#1e1e1e;

border-radius:15px;

padding:25px;

font-size:20px;

text-align:center;

cursor:pointer;

transition:0.25s;

}

.game:hover{

transform:scale(1.05);

background:#333;

}

iframe{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

border:none;

display:none;

z-index:5;

}

.back{

position:fixed;

top:20px;

left:20px;

background:red;

color:white;

border:none;

border-radius:10px;

padding:10px 20px;

font-size:16px;

display:none;

z-index:10;

}

</style>

</head>

<body>

<header>

🌌 Infinity Game Universe

</header>

<div class="games">

<div class="game" onclick="play('fps.html')">

🔫 FPS

</div>

<div class="game" onclick="play('racing.html')">

🏎 Racing

</div>

<div class="game" onclick="play('sandbox.html')">

🧱 Sandbox

</div>

<div class="game" onclick="play('ai.html')">

🤖 AI Battle

</div>

<div class="game" onclick="play('arcade.html')">

🕹 Arcade

</div>

<div class="game" onclick="play('openworld.html')">

🌍 Open World

</div>

</div>

<button class="back" onclick="back()">

戻る

</button>

<iframe id="game"></iframe>

<script>

function play(game){

document.getElementById("game").src=game

document.getElementById("game").style.display="block"

document.querySelector(".back").style.display="block"

}

function back(){

document.getElementById("game").style.display="none"

document.querySelector(".back").style.display="none"

}

</script>

</body>
</html>
