<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width">
<style>
body{margin:0;overflow:hidden;}
</style>
</head>

<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

let scene=new THREE.Scene()

let camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight)

let renderer=new THREE.WebGLRenderer()

renderer.setSize(innerWidth,innerHeight)

document.body.appendChild(renderer.domElement)

let light=new THREE.DirectionalLight(0xffffff,1)
light.position.set(5,10,5)
scene.add(light)

let ground=new THREE.Mesh(
new THREE.PlaneGeometry(500,500),
new THREE.MeshLambertMaterial({color:0x228822})
)

ground.rotation.x=-Math.PI/2
scene.add(ground)

let player=new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshLambertMaterial({color:0x00ffff})
)

scene.add(player)

camera.position.set(0,5,10)

document.addEventListener("keydown",(e)=>{

if(e.key=="w") player.position.z-=0.5
if(e.key=="s") player.position.z+=0.5
if(e.key=="a") player.position.x-=0.5
if(e.key=="d") player.position.x+=0.5

})

function animate(){

requestAnimationFrame(animate)

camera.lookAt(player.position)

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
